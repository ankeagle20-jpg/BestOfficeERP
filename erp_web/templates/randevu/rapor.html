{% extends "layout.html" %}
{% block page_title %}Randevu Raporu — OFİSBİR ERP{% endblock %}

{% block extra_head %}
<style>
  .rr-page { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .rr-back { margin-bottom: 14px; }
  .rr-back a { color: #4fc3f7; text-decoration: none; font-size: 13px; }
  .rr-back a:hover { text-decoration: underline; }
  .rr-title { color: #e0f7fa; font-size: 20px; margin: 0 0 16px; }
  .rr-filtre {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    background: #1e3a50; border: 1px solid #2d4060; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .rr-filtre label { display: block; color: #b0bec5; font-size: 12px; margin-bottom: 4px; }
  .rr-filtre input[type="date"] {
    padding: 8px 10px; border-radius: 4px; border: 1px solid #2d4060;
    background: #0f2537; color: #e0f7fa;
  }
  .rr-btn {
    background: #0d47a1; color: #fff; border: none; padding: 10px 18px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .rr-btn:hover { background: #1565c0; }
  .rr-btn:disabled { opacity: 0.6; cursor: wait; }
  .rr-msg { color: #90a4ae; font-size: 13px; margin: 12px 0; }
  .rr-msg.err { color: #ef9a9a; }
  .rr-wrap {
    background: #1e3a50; border: 1px solid #2d4060; border-radius: 8px; overflow: auto;
  }
  .rr-tablo {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .rr-tablo th, .rr-tablo td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid #2d4060;
  }
  .rr-tablo th { background: #0f2537; color: #4fc3f7; font-weight: 600; }
  .rr-tablo tbody tr:hover { background: #243b52; }
  .rr-tur {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .rr-tur-toplanti { background: rgba(79, 195, 247, 0.18); color: #4fc3f7; }
  .rr-tur-gorusme { background: rgba(129, 199, 132, 0.18); color: #81c784; }
  .rr-ozet { color: #90a4ae; font-size: 12px; margin-top: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="rr-page">
  <div class="rr-back">
    <a href="{{ url_for('randevu.randevu_al') }}"><i class="fa fa-arrow-left"></i> Randevu Al sayfasına dön</a>
  </div>
  <h1 class="rr-title">Randevu Raporu</h1>

  <div class="rr-filtre">
    <div>
      <label for="rr_baslangic">Başlangıç</label>
      <input type="date" id="rr_baslangic">
    </div>
    <div>
      <label for="rr_bitis">Bitiş</label>
      <input type="date" id="rr_bitis">
    </div>
    <button type="button" class="rr-btn" id="rr_btn" onclick="rrRaporAl()">
      <i class="fa fa-search"></i> Rapor Al
    </button>
  </div>

  <div id="rr_msg" class="rr-msg" style="display:none;"></div>
  <div class="rr-wrap" id="rr_wrap" style="display:none;">
    <table class="rr-tablo">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Müşteri</th>
          <th>Tür</th>
          <th>Saat</th>
          <th>Toplantı Yeri</th>
        </tr>
      </thead>
      <tbody id="rr_tbody"></tbody>
    </table>
  </div>
  <div id="rr_ozet" class="rr-ozet" style="display:none;"></div>
</div>

<script>
(function () {
  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function rrEsc(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function isoDate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function defaultRange() {
    var bugun = new Date();
    var ayBas = new Date(bugun.getFullYear(), bugun.getMonth(), 1);
    document.getElementById('rr_baslangic').value = isoDate(ayBas);
    document.getElementById('rr_bitis').value = isoDate(bugun);
  }
  function setMsg(text, isErr) {
    var el = document.getElementById('rr_msg');
    if (!text) { el.style.display = 'none'; el.textContent = ''; return; }
    el.style.display = 'block';
    el.className = 'rr-msg' + (isErr ? ' err' : '');
    el.textContent = text;
  }
  window.rrRaporAl = function () {
    var bas = (document.getElementById('rr_baslangic').value || '').trim();
    var bit = (document.getElementById('rr_bitis').value || '').trim();
    if (!bas || !bit) {
      setMsg('Başlangıç ve bitiş tarihi seçin.', true);
      return;
    }
    var btn = document.getElementById('rr_btn');
    var wrap = document.getElementById('rr_wrap');
    var ozet = document.getElementById('rr_ozet');
    btn.disabled = true;
    setMsg('Yükleniyor…', false);
    wrap.style.display = 'none';
    ozet.style.display = 'none';
    var url = '/randevu/api/rapor?baslangic=' + encodeURIComponent(bas) + '&bitis=' + encodeURIComponent(bit);
    fetch(url, { credentials: 'same-origin', headers: { 'Accept': 'application/json' } })
      .then(function (r) {
        return r.json().then(function (d) {
          if (!r.ok) throw new Error((d && d.mesaj) || ('HTTP ' + r.status));
          return d;
        });
      })
      .then(function (d) {
        if (!d || !d.ok) {
          setMsg((d && d.mesaj) || 'Rapor alınamadı.', true);
          return;
        }
        var kayitlar = d.kayitlar || [];
        var tbody = document.getElementById('rr_tbody');
        if (!kayitlar.length) {
          tbody.innerHTML = '';
          wrap.style.display = 'none';
          setMsg('Bu tarih aralığında randevu yok.', false);
          ozet.style.display = 'none';
          return;
        }
        setMsg('', false);
        tbody.innerHTML = kayitlar.map(function (k) {
          var tur = k.tur || '';
          var cls = (tur === 'Görüşme') ? 'rr-tur rr-tur-gorusme' : 'rr-tur rr-tur-toplanti';
          return '<tr>' +
            '<td>' + rrEsc(k.tarih || '—') + '</td>' +
            '<td>' + rrEsc(k.musteri_adi || '—') + '</td>' +
            '<td><span class="' + cls + '">' + rrEsc(tur || '—') + '</span></td>' +
            '<td>' + rrEsc(k.saat || '—') + '</td>' +
            '<td>' + rrEsc(k.oda_adi || '—') + '</td>' +
            '</tr>';
        }).join('');
        wrap.style.display = 'block';
        ozet.style.display = 'block';
        ozet.textContent = 'Toplam ' + (d.toplam != null ? d.toplam : kayitlar.length) + ' kayıt';
      })
      .catch(function (err) {
        setMsg('Rapor alınamadı: ' + (err.message || err), true);
      })
      .finally(function () {
        btn.disabled = false;
      });
  };
  defaultRange();
})();
</script>
{% endblock %}
