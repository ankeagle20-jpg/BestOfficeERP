{% extends "layout.html" %}

{% block page_title %}Yeni Müşteri Ekle{% endblock %}

{% block content %}
<style>
.ekle-wrap { max-width: 560px; margin: 0 auto; }
.ekle-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.ekle-header a {
  text-decoration: none;
  color: #4fc3f7;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 600;
}
.ekle-header h1 { color: #e0f7fa; font-size: 20px; margin: 0; }
.ekle-card {
  background: rgba(15, 37, 55, 0.65);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.ekle-card label {
  display: block;
  color: #90a4ae;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
}
.ekle-card input,
.ekle-card textarea {
  width: 100%;
  background: rgba(45, 64, 96, 0.6);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e0f7fa;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 14px;
  margin-bottom: 14px;
  box-sizing: border-box;
}
.ekle-card textarea { min-height: 80px; resize: vertical; }
.ekle-card input:focus,
.ekle-card textarea:focus {
  outline: none;
  border-color: #4fc3f7;
  box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.2);
}
.ekle-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.ekle-actions button[type="submit"] {
  background: #4fc3f7;
  color: #0a1929;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.ekle-actions button[type="submit"]:hover { filter: brightness(1.1); }
.ekle-actions a.btn-iptal {
  background: #6b7280;
  color: #fff;
  padding: 10px 20px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.ekle-actions a.btn-iptal:hover { background: #4b5563; }
</style>

<div class="ekle-wrap">
  <div class="ekle-header">
    <a href="{{ url_for('musteriler.list_full') }}"><i class="fa fa-arrow-left"></i> Müşteri Listesi</a>
    <h1><i class="fa fa-user-plus" style="color:#4fc3f7;"></i> Yeni Müşteri Ekle</h1>
  </div>

  <div class="ekle-card">
    <form method="post" action="{{ url_for('musteriler.ekle') }}">
      <label for="musteri_adi">Müşteri adı</label>
      <input type="text" id="musteri_adi" name="musteri_adi" placeholder="Kısa / görünen ad (isteğe bağlı)">

      <label for="name">Ad / Ünvan <span style="color:#f44336;">*</span></label>
      <input type="text" id="name" name="name" required placeholder="Şirket unvanı veya ad soyad">

      <label for="email">E-posta</label>
      <input type="email" id="email" name="email" placeholder="ornek@firma.com">

      <label for="phone">Telefon</label>
      <input type="text" id="phone" name="phone" placeholder="05XX XXX XX XX">

      <label for="address">Adres</label>
      <input type="text" id="address" name="address" placeholder="Adres">

      <label for="notes">Notlar</label>
      <textarea id="notes" name="notes" placeholder="Opsiyonel notlar"></textarea>

      <div class="ekle-actions">
        <button type="submit"><i class="fa fa-check"></i> Kaydet</button>
        <a href="{{ url_for('musteriler.list_full') }}" class="btn-iptal"><i class="fa fa-times"></i> İptal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
