{% extends "layout.html" %}

{% block page_title %}Finans{% endblock %}

{% block content %}
{% include 'partials/erp_page_style.html' %}
<style>
.erp-page-wrap .iframe-wrapper {
  background: var(--erp-bg);
  border: var(--erp-border);
  border-radius: var(--erp-radius);
  overflow: hidden;
  margin-top: 16px;
}
.iframe-wrapper iframe {
  width: 100%;
  height: calc(100vh - 250px);
  border: none;
  display: block;
}
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>

<div class="erp-page-wrap">
<div class="erp-tab-bar">
  <a href="/musteriler/" class="page-title-prefix"><i class="fa fa-arrow-left"></i> Müşteriler</a>
  <div class="tabs">
    <a href="/musteriler/" class="tab"><i class="fa fa-th-large"></i><span>Özet</span></a>
    <a href="/faturalar/finans" class="tab active"><i class="fa fa-file-invoice"></i><span>Faturalar</span></a>
    <a href="/faturalar/finans#tahsilat" class="tab" onclick="event.preventDefault(); switchTab(1);"><i class="fa fa-money-bill-wave"></i><span>Tahsilatlar</span></a>
  </div>
</div>

<!-- Sekme İçerikleri -->
<div class="tab-content active" id="tab-0">
    <div class="iframe-wrapper">
        <iframe src="/faturalar/faturalar"></iframe>
    </div>
</div>

<div class="tab-content" id="tab-1">
    <div class="iframe-wrapper">
        <iframe src="/faturalar/tahsilatlar"></iframe>
    </div>
</div>
</div>

<script>
function switchTab(index) {
    // Tüm sekmeleri pasif yap
    document.querySelectorAll('.tab').forEach((t, i) => {
        if (i === index) {
            t.classList.add('active');
        } else {
            t.classList.remove('active');
        }
    });
    
    // Tüm içerikleri gizle
    document.querySelectorAll('.tab-content').forEach((c, i) => {
        if (i === index) {
            c.classList.add('active');
        } else {
            c.classList.remove('active');
        }
    });
}
</script>
{% endblock %}
