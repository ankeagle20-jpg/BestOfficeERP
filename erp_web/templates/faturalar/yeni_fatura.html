<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Fatura Oluştur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1929;
            color: #e0f7fa;
            padding: 16px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .page-header h2 {
            font-size: 18px;
            color: #4fc3f7;
        }
        .page-actions button {
            background: #00bcd4;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .page-actions button.secondary {
            background: #7e57c2;
        }
        .page-actions button:hover {
            opacity: 0.9;
        }
        .panel {
            background: #102133;
            border-radius: 8px;
            border: 1px solid #1e3a50;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .panel h3 {
            font-size: 14px;
            color: #4fc3f7;
            margin-bottom: 8px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .form-row label {
            min-width: 110px;
            font-size: 12px;
            color: #b0bec5;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            flex: 1;
            background: #1e3a50;
            border: 1px solid #2d4060;
            color: #e0f7fa;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .form-row textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row small {
            font-size: 11px;
            color: #78909c;
        }
        .tag {
            display: inline-block;
            background: #0f2537;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            color: #90a4ae;
            margin-top: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 6px;
        }
        thead { background: #0f2537; }
        th, td {
            padding: 8px 6px;
            border-bottom: 1px solid #1e3a50;
        }
        th {
            font-size: 11px;
            color: #4fc3f7;
            text-align: left;
        }
        tbody tr:hover { background: #12263d; }
        td input, td select {
            width: 100%;
            background: #1e3a50;
            border: 1px solid #2d4060;
            color: #e0f7fa;
            padding: 4px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        td input[type="number"] { text-align: right; }
        .btn-icon {
            background: #c62828;
            border: none;
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-add-row { margin-top: 8px; background: #26a69a; }
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .summary-item {
            background: #102133;
            border-radius: 6px;
            border: 1px solid #1e3a50;
            padding: 8px 10px;
            font-size: 12px;
        }
        .summary-item label {
            display: block;
            color: #90a4ae;
            margin-bottom: 4px;
        }
        .summary-item .value {
            font-size: 16px;
            font-weight: 600;
            color: #4fc3f7;
        }
        .summary-item .sub { font-size: 11px; color: #78909c; }
        .summary-item.total .value { color: #69f0ae; }
        .error { border-color: #e57373 !important; }
        .musteri-opt { padding: 6px 10px; cursor: pointer; font-size: 13px; color: #e0f7fa; }
        .musteri-opt:hover { background: #1e3a50; }
        .musteri-opt-active { background: #264a7a; }
        .urun-opt { padding: 4px 8px; cursor: pointer; font-size: 12px; color: #e0f7fa; }
        .urun-opt:hover { background: #1e3a50; }
    </style>
</head>
<body>
    <div class="page-header">
        <h2><i class="fa fa-file-invoice"></i> Yeni Fatura Oluştur</h2>
        <div class="page-actions">
            <button type="button" class="secondary" id="btn-onizleme"><i class="fa fa-eye"></i> Önizleme</button>
        </div>
    </div>

    <div class="panel">
        <h3>Fatura Bilgileri</h3>
        <div class="grid-2">
            <div>
                <div class="form-row">
                    <label>Fatura No</label>
                    <input type="text" id="fatura-no" placeholder="Boş bırakırsanız otomatik atanır">
                </div>
                <div class="form-row">
                    <label>Fatura Tarihi</label>
                    <input type="date" id="fatura-tarihi" value="{{ bugun }}">
                </div>
                <div class="form-row">
                    <label>Fatura Saati</label>
                    <input type="time" id="fatura-saati" value="{{ saat }}">
                </div>
                <div class="form-row">
                    <label>Fatura Tipi</label>
                    <select id="fatura-tipi">
                        <option value="satis">Satış</option>
                        <option value="iade">İade</option>
                        <option value="tevkifatli">Tevkifatlı</option>
                        <option value="istisna">İstisna</option>
                    </select>
                </div>
            </div>
            <div>
                <div class="form-row">
                    <label>Müşteri <span style="color:#ffb74d;">*</span></label>
                    <input type="text" id="musteri-ara" placeholder="Müşteri ara, seçin..." autocomplete="off">
                    <input type="hidden" id="musteri-id">
                </div>
                <div id="musteri-sonuclar" style="max-height:180px;overflow-y:auto;margin-bottom:6px;border-radius:4px;border:1px solid #1e3a50;background:#0f2537;display:none;margin-left:110px;max-width:calc(100% - 110px);"></div>
                <div id="musteri-ozet" class="tag" style="display:none;"></div>
                <div class="form-row">
                    <label>Adres</label>
                    <input type="text" id="musteri-adres" placeholder="Seçili müşterinin adresi" readonly>
                </div>
                <div class="form-row">
                    <label>Vergi Dairesi</label>
                    <input type="text" id="musteri-vergi-dairesi" placeholder="Seçili müşterinin vergi dairesi" readonly>
                </div>
                <div class="form-row">
                    <label>VKN / TCKN</label>
                    <input type="text" id="musteri-vergi-no" placeholder="Seçili müşterinin vergi numarası" readonly>
                </div>
                <div class="form-row">
                    <label>Notlar</label>
                    <textarea id="fatura-not" placeholder="Opsiyonel açıklama / not"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-row-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h3 style="margin-bottom:0;">Fatura Satırları</h3>
            <div style="display:inline-flex; align-items:center; gap:8px;">
                <button type="button" id="btn-fatura-olustur" class="btn-icon" style="background:#00bcd4; color:#fff; border:none; padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;">
                    <i class="fa fa-file-invoice"></i> Fatura Oluştur
                </button>
                <button type="button" id="btn-yeni-fatura-aylik" class="btn-icon" style="background:#00695c; color:#fff; border:none; padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;">
                    <i class="fa fa-file-invoice"></i> Yeni Fatura Oluştur
                </button>
            </div>
        </div>
        <table id="satir-tablo">
            <thead>
                <tr>
                    <th style="width:26%;">Hizmet / Ürün</th>
                    <th style="width:7%;">Miktar</th>
                    <th style="width:7%;">Birim</th>
                    <th style="width:11%;">Birim Fiyat</th>
                    <th style="width:7%;">İsk. %</th>
                    <th style="width:10%;">İskontu Tutarı</th>
                    <th style="width:7%;">KDV %</th>
                    <th style="width:15%;">Satır Toplam (KDV Dahil)</th>
                    <th style="width:6%;text-align:center;">Sil</th>
                </tr>
            </thead>
            <tbody id="satir-tbody"></tbody>
        </table>
        <div id="urun-sonuclar" style="display:none;max-height:200px;overflow-y:auto;border-radius:4px;border:1px solid #1e3a50;background:#0f2537;margin-top:4px;"></div>
        <button type="button" id="btn-satir-ekle" class="btn-icon btn-add-row"><i class="fa fa-plus"></i> Satır Ekle</button>

        <div class="summary">
            <div class="summary-item">
                <label>Ara Toplam (KDV Hariç)</label>
                <div class="value" id="ozet-ara-toplam">0,00 ₺</div>
                <div class="sub">Tüm satırların KDV hariç toplamı</div>
            </div>
            <div class="summary-item">
                <label>Toplam İskonto</label>
                <div class="value" id="ozet-iskonto">0,00 ₺</div>
                <div class="sub">Satırlardaki indirimlerin toplamı</div>
            </div>
            <div class="summary-item">
                <label>KDV Toplamı</label>
                <div class="value" id="ozet-kdv">0,00 ₺</div>
                <div class="sub">Tüm satırların KDV toplamı</div>
            </div>
            <div class="summary-item total">
                <label>Genel Toplam</label>
                <div class="value" id="ozet-genel">0,00 ₺</div>
                <div class="sub" id="ozet-yazi">#Tutarı girin#</div>
            </div>
        </div>
    </div>

    <script>
    (function(){
        const API_MUSTERI_ARA = "{{ url_for('musteriler.api_musteri_ara') }}";
        const API_MUSTERI_KYC = "{{ url_for('musteriler.api_kyc_getir') }}";
        const API_FATURA_EKLE = "{{ url_for('faturalar.fatura_ekle') }}";
        const API_TUTAR_YAZI = "{{ url_for('faturalar.tutar_yazi_api') }}";
        const API_FATURA_ONIZLE = "{{ url_for('faturalar.fatura_onizleme') }}";
        const FATURA_ONIZLEME_URL = "{{ url_for('faturalar.fatura_onizleme_ekran', fatura_id=0) }}".replace('/0', '/');
        const SECILI_MUSTERI = {{ (secili_musteri | tojson) if secili_musteri else 'null' }};
        const DEFAULT_HIZMET_URUN = {{ (default_hizmet_urun or '') | tojson }};
        const DEFAULT_BIRIM_FIYAT = {{ default_birim_fiyat | default(0) }};

        const musteriAra = document.getElementById('musteri-ara');
        const musteriSonuclar = document.getElementById('musteri-sonuclar');
        const musteriIdEl = document.getElementById('musteri-id');
        const musteriOzet = document.getElementById('musteri-ozet');
        const tbody = document.getElementById('satir-tbody');

        function formatMoney(n) {
            return (Number(n) || 0).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
        }
        function parseNumber(v) {
            if (v === null || v === undefined) return 0;
            const s = String(v).replace('.', '').replace(',', '.').replace(/\\s/g, '');
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
        }

        async function urunSecVeDoldur(tr, q) {
            try {
                const query = (q || '').trim();
                const url = query ? ('/urunler/api/list?q=' + encodeURIComponent(query)) : '/urunler/api/list';
                const res = await fetch(url);
                const rows = await res.json();
                const liste = document.getElementById('urun-sonuclar');
                if (!liste) return;
                if (!rows || !rows.length) {
                    liste.innerHTML = '<div style="padding:6px 8px;font-size:12px;color:#90a4ae;">Ürün bulunamadı.</div>';
                    liste.style.display = 'block';
                    return;
                }
                liste.innerHTML = rows.map(function(r){
                    const ad = (r.urun_adi || '');
                    const kod = (r.stok_kodu || '');
                    const fiyat = (r.birim_fiyat != null ? r.birim_fiyat : 0);
                    return '<div class="urun-opt" data-ad="'+ad.replace(/"/g,'&quot;')+'" data-birim="'+(r.birim || '')+'" data-fiyat="'+fiyat+'">'+
                        (kod ? ('<strong>'+kod+'</strong> - ') : '') + ad +
                        '</div>';
                }).join('');
                liste.style.display = 'block';
                liste.querySelectorAll('.urun-opt').forEach(function(div){
                    div.onclick = function() {
                        const adInp = tr.querySelector('.inp-urun');
                        const birimInp = tr.querySelector('.inp-birim');
                        const fiyatInp = tr.querySelector('.inp-birim-fiyat');
                        const ad = this.getAttribute('data-ad') || this.textContent;
                        const birim = this.getAttribute('data-birim') || '';
                        const fiyat = parseFloat(this.getAttribute('data-fiyat') || '0');
                        if (adInp) adInp.value = ad;
                        if (birimInp && birim) birimInp.value = birim;
                        if (fiyatInp) fiyatInp.value = fiyat ? String(fiyat).replace('.', ',') : '';
                        liste.style.display = 'none';
                        recalc();
                    };
                });
            } catch (e) {
                const liste = document.getElementById('urun-sonuclar');
                if (liste) {
                    liste.innerHTML = '<div style="padding:6px 8px;font-size:12px;color:#f44336;">Ürünler yüklenemedi.</div>';
                    liste.style.display = 'block';
                }
            }
        }

        function addRow(initial) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div style="display:flex; gap:4px; align-items:center; position:relative;">
                        <input type="text" class="inp-urun" placeholder="Hizmet / ürün adı" value="${initial && initial.ad || ''}" style="flex:1;">
                        <button type="button" class="btn-icon btn-urun-sec" title="Ürün seç" style="padding:2px 6px;"><i class="fa fa-box-open"></i></button>
                    </div>
                </td>
                <td><input type="number" step="0.01" min="0" class="inp-miktar" value="${initial && initial.miktar || 1}"></td>
                <td>
                    <select class="inp-birim">
                        <option value="Adet">Adet</option>
                        <option value="Gün">Gün</option>
                        <option value="Ay">Ay</option>
                        <option value="KG">KG</option>
                    </select>
                </td>
                <td><input type="number" step="0.01" min="0" class="inp-birim-fiyat" value="${initial && initial.birim_fiyat || ''}"></td>
                <td><input type="number" step="0.01" min="0" max="100" class="inp-iskonto" value="${initial && initial.iskonto_orani || 0}" placeholder="%"></td>
                <td><input type="number" step="0.01" min="0" class="inp-iskonto-tutar" value="${initial && initial.iskonto_tutar != null ? initial.iskonto_tutar : ''}" placeholder="Tutar"></td>
                <td>
                    <select class="inp-kdv">
                        <option value="1">%1</option>
                        <option value="10">%10</option>
                        <option value="20" selected>%20</option>
                    </select>
                </td>
                <td class="satir-toplam" style="text-align:right;">0,00 ₺</td>
                <td style="text-align:center;"><button type="button" class="btn-icon btn-satir-sil"><i class="fa fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
            const birimSel = tr.querySelector('.inp-birim');
            const kdvSel = tr.querySelector('.inp-kdv');
            if (initial && initial.birim) birimSel.value = initial.birim;
            if (initial && initial.kdv_orani != null) kdvSel.value = String(initial.kdv_orani);
            tr.querySelectorAll('input,select').forEach(inp => {
                inp.addEventListener('input', recalc);
                inp.addEventListener('change', recalc);
            });
            const urunBtn = tr.querySelector('.btn-urun-sec');
            const urunInp = tr.querySelector('.inp-urun');
            if (urunBtn) {
                urunBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    urunSecVeDoldur(tr, urunInp ? urunInp.value : '');
                });
            }
            if (urunInp) {
                let timer = null;
                urunInp.addEventListener('focus', function() {
                    urunSecVeDoldur(tr, this.value);
                });
                urunInp.addEventListener('input', function() {
                    const val = this.value;
                    clearTimeout(timer);
                    timer = setTimeout(function(){ urunSecVeDoldur(tr, val); }, 250);
                });
            }
            tr.querySelector('.btn-satir-sil').addEventListener('click', function(e){
                e.stopPropagation();
                tr.remove();
                recalc();
            });
            recalc();
        }

        function getRows() {
            const rows = [];
            tbody.querySelectorAll('tr').forEach(tr => {
                const ad = tr.querySelector('.inp-urun').value.trim();
                const miktar = parseNumber(tr.querySelector('.inp-miktar').value);
                const birim = tr.querySelector('.inp-birim').value;
                const birimFiyat = parseNumber(tr.querySelector('.inp-birim-fiyat').value);
                const iskonto = parseNumber(tr.querySelector('.inp-iskonto').value);
                const iskontoTutarVal = tr.querySelector('.inp-iskonto-tutar').value.trim();
                const iskonto_tutar = iskontoTutarVal === '' ? null : parseNumber(iskontoTutarVal);
                const kdv = parseNumber(tr.querySelector('.inp-kdv').value);
                if (!ad && miktar === 0 && birimFiyat === 0) return;
                rows.push({ ad, miktar, birim, birim_fiyat: birimFiyat, iskonto_orani: iskonto, iskonto_tutar: iskonto_tutar, kdv_orani: kdv });
            });
            return rows;
        }

        async function recalc() {
            let araToplam = 0, toplamIskonto = 0, kdvToplam = 0;
            tbody.querySelectorAll('tr').forEach(tr => {
                const miktar = parseNumber(tr.querySelector('.inp-miktar').value);
                const birimFiyat = parseNumber(tr.querySelector('.inp-birim-fiyat').value);
                const iskontoInp = tr.querySelector('.inp-iskonto');
                const iskontoTutarEl = tr.querySelector('.inp-iskonto-tutar');
                let iskonto = parseNumber(iskontoInp ? iskontoInp.value : 0);
                let iskontoTutarInp = parseNumber(iskontoTutarEl ? iskontoTutarEl.value : 0);
                const kdv = parseNumber(tr.querySelector('.inp-kdv').value);
                const brut = miktar * birimFiyat;

                let iskontoTutar = 0;
                if (brut > 0) {
                    if (iskontoTutarEl && iskontoTutarEl.value.trim() !== '' && iskontoTutarInp > 0) {
                        // Kullanıcı iskonto tutarını girdi -> yüzdeyi güncelle
                        iskontoTutar = Math.min(iskontoTutarInp, brut);
                        const yeniYuzde = (iskontoTutar / brut) * 100;
                        if (Math.abs(iskonto - yeniYuzde) > 0.01) {
                            iskonto = yeniYuzde;
                            if (iskontoInp) iskontoInp.value = yeniYuzde.toFixed(2);
                        }
                    } else if (iskonto > 0) {
                        // Kullanıcı oran girdi -> tutarı güncelle
                        iskontoTutar = brut * (iskonto / 100);
                        if (iskontoTutarEl) iskontoTutarEl.value = iskontoTutar.toFixed(2);
                    }
                }

                const net = brut - iskontoTutar;
                const kdvTutar = net * (kdv / 100);
                const toplam = net + kdvTutar;
                araToplam += brut;
                toplamIskonto += iskontoTutar;
                kdvToplam += kdvTutar;
                tr.querySelector('.satir-toplam').textContent = formatMoney(toplam);
            });
            const genelToplam = araToplam - toplamIskonto + kdvToplam;
            document.getElementById('ozet-ara-toplam').textContent = formatMoney(araToplam);
            document.getElementById('ozet-iskonto').textContent = formatMoney(toplamIskonto);
            document.getElementById('ozet-kdv').textContent = formatMoney(kdvToplam);
            document.getElementById('ozet-genel').textContent = formatMoney(genelToplam);

            try {
                const res = await fetch(API_TUTAR_YAZI + '?tutar=' + encodeURIComponent(genelToplam.toFixed(2)));
                const j = await res.json();
                if (j && j.yazi) document.getElementById('ozet-yazi').textContent = '#' + j.yazi + '#';
            } catch(e){}
        }

        let musteriTimer = null;
        async function musteriListeGetir(q, showAllOnEmpty) {
            const query = (q || '').trim();
            if (!query && !showAllOnEmpty) {
                musteriSonuclar.style.display = 'none';
                return;
            }
            try {
                const url = query ? (API_MUSTERI_ARA + '?q=' + encodeURIComponent(query)) : API_MUSTERI_ARA;
                const res = await fetch(url);
                const rows = await res.json();
                    if (!rows || !rows.length) {
                        musteriSonuclar.innerHTML = '<div style="padding:6px 10px;font-size:12px;color:#78909c;">Müşteri bulunamadı.</div>';
                    } else {
                        musteriSonuclar.innerHTML = rows.map(function(r){ return '<div class=\"musteri-opt\" data-id=\"'+r.id+'\">'+(r.name || '')+'</div>'; }).join('');
                    }
                musteriSonuclar.style.display = 'block';
                musteriSonuclar.querySelectorAll('div[data-id]').forEach(function(div){
                        div.addEventListener('click', async function() {
                        const id = this.getAttribute('data-id');
                        const ad = this.textContent || '';
                        musteriIdEl.value = id;
                        musteriAra.value = ad;
                        musteriSonuclar.style.display = 'none';
                        musteriOzet.style.display = 'none';  // Özet satırı kaldırıldı, bilgiler formda
                            // Alanları temizle
                            const adrEl = document.getElementById('musteri-adres');
                            const vdEl = document.getElementById('musteri-vergi-dairesi');
                            const vnEl = document.getElementById('musteri-vergi-no');
                            if (adrEl) adrEl.value = '';
                            if (vdEl) vdEl.value = '';
                            if (vnEl) vnEl.value = '';
                        try {
                            const res2 = await fetch(API_MUSTERI_KYC + '?musteri_id=' + encodeURIComponent(id));
                            const d = await res2.json();
                            let ek = '';
                                if (d) {
                                    const adr = d.yeni_adres || d.address || '';
                                    const vd = d.vergi_dairesi || 'Kavaklıdere';
                                    const vn = d.vergi_no || d.tax_number || '';
                                    if (adrEl) adrEl.value = adr;
                                    if (vdEl) vdEl.value = vd;
                                    if (vnEl) vnEl.value = vn;
                                }
                        } catch(e){}
                    });
                });
            } catch(e){
                musteriSonuclar.style.display = 'none';
            }
        }

        musteriAra.addEventListener('input', function() {
            clearTimeout(musteriTimer);
            const q = this.value;
            if (!q.trim()) {
                // yazı temizlenirse seçimi de temizle ama listeyi gizleme, focus event'i handle eder
                musteriIdEl.value = '';
                musteriOzet.style.display = 'none';
                const adrEl = document.getElementById('musteri-adres');
                const vdEl = document.getElementById('musteri-vergi-dairesi');
                const vnEl = document.getElementById('musteri-vergi-no');
                if (adrEl) adrEl.value = '';
                if (vdEl) vdEl.value = '';
                if (vnEl) vnEl.value = '';
            }
            musteriTimer = setTimeout(function(){ musteriListeGetir(q, false); }, 300);
        });

        musteriAra.addEventListener('focus', function() {
            clearTimeout(musteriTimer);
            musteriTimer = setTimeout(function(){ musteriListeGetir(musteriAra.value, true); }, 10);
        });

        document.addEventListener('click', function(e){
            if (!musteriSonuclar.contains(e.target) && e.target !== musteriAra) {
                musteriSonuclar.style.display = 'none';
            }
        });

        document.getElementById('btn-satir-ekle').addEventListener('click', function(){ addRow(); });

        // Giriş sayfasından ?musteri_id= ile açıldıysa seçili firma bilgilerini doldur
        if (SECILI_MUSTERI) {
            musteriIdEl.value = SECILI_MUSTERI.id;
            musteriAra.value = SECILI_MUSTERI.name || '';
            const adrEl = document.getElementById('musteri-adres');
            const vdEl = document.getElementById('musteri-vergi-dairesi');
            const vnEl = document.getElementById('musteri-vergi-no');
            if (adrEl) adrEl.value = SECILI_MUSTERI.address || '';
            if (vdEl) vdEl.value = SECILI_MUSTERI.vergi_dairesi || '';
            if (vnEl) vnEl.value = SECILI_MUSTERI.vergi_no || '';
            musteriOzet.style.display = 'none';  // Müşteri özet satırı gösterilmiyor, bilgiler formda
        }

        // İlk satır: müşterinin hizmet türü (sanal ofis vb.) ve aylık tutar varsa varsayılan doldur; manuel değiştirilebilir
        if (SECILI_MUSTERI && (DEFAULT_HIZMET_URUN || DEFAULT_BIRIM_FIYAT)) {
            addRow({ ad: DEFAULT_HIZMET_URUN, miktar: 1, birim: 'Ay', birim_fiyat: DEFAULT_BIRIM_FIYAT });
        } else {
            addRow();
        }

        function validateForm() {
            let ok = true;
            musteriAra.classList.remove('error');
            if (!musteriIdEl.value) {
                musteriAra.classList.add('error');
                ok = false;
            }
            const rows = getRows();
            if (!rows.length) {
                alert('En az bir fatura satırı girmelisiniz.');
                ok = false;
            }
            return { ok, rows };
        }

        async function kaydet() {
            const v = validateForm();
            if (!v.ok) {
                alert('Lütfen zorunlu alanları doldurun.');
                return;
            }
            const rows = v.rows;
            let araToplam = 0, toplamIskonto = 0, kdvToplam = 0;
            rows.forEach(r => {
                const brut = r.miktar * r.birim_fiyat;
                const isk = (r.iskonto_tutar != null && r.iskonto_tutar > 0) ? Math.min(r.iskonto_tutar, brut) : brut * (r.iskonto_orani / 100);
                const net = brut - isk;
                const kdv = net * (r.kdv_orani / 100);
                araToplam += brut;
                toplamIskonto += isk;
                kdvToplam += kdv;
            });
            const genelToplam = araToplam - toplamIskonto + kdvToplam;

            const payload = {
                fatura_no: document.getElementById('fatura-no').value.trim() || null,
                fatura_tarihi: document.getElementById('fatura-tarihi').value,
                fatura_saati: document.getElementById('fatura-saati').value,
                fatura_tipi: document.getElementById('fatura-tipi').value,
                musteri_id: musteriIdEl.value,
                musteri_adi: musteriAra.value.trim(),
                notlar: document.getElementById('fatura-not').value.trim() || null,
                satirlar: rows,
                ara_toplam: araToplam,
                toplam_iskonto: toplamIskonto,
                kdv_toplam: kdvToplam,
                toplam: genelToplam
            };

            try {
                const res = await fetch(API_FATURA_EKLE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const j = await res.json();
                if (j.ok && j.fatura_id) {
                    window.location.href = FATURA_ONIZLEME_URL + j.fatura_id;
                    return;
                }
                if (j.ok) {
                    alert(j.mesaj || 'Fatura kaydedildi.');
                    document.getElementById('fatura-no').value = '';
                    document.getElementById('fatura-not').value = '';
                    musteriAra.value = '';
                    musteriIdEl.value = '';
                    musteriOzet.style.display = 'none';
                    tbody.innerHTML = '';
                    addRow();
                    recalc();
                } else {
                    alert(j.mesaj || 'Fatura kaydedilemedi.');
                }
            } catch(e){
                alert('Fatura kaydedilirken hata: ' + (e.message || e));
            }
        }

        document.getElementById('btn-fatura-olustur').addEventListener('click', kaydet);

        document.getElementById('btn-yeni-fatura-aylik').addEventListener('click', function(){
            var mid = (document.getElementById('musteri-id') || {}).value || '';
            var url = '/faturalar/yeni';
            if (mid) url += '?musteri_id=' + encodeURIComponent(mid);
            window.open(url, '_blank', 'noopener');
        });

        document.getElementById('btn-onizleme').addEventListener('click', async function(){
            const v = validateForm();
            if (!v.ok) {
                alert('Önizleme için de müşteri ve en az bir satır gerekli.');
                return;
            }
            const rows = v.rows;
            let araToplam = 0, toplamIskonto = 0, kdvToplam = 0;
            rows.forEach(function(r){
                const brut = r.miktar * r.birim_fiyat;
                const isk = (r.iskonto_tutar != null && r.iskonto_tutar > 0) ? Math.min(r.iskonto_tutar, brut) : brut * (r.iskonto_orani / 100);
                const net = brut - isk;
                const kdv = net * (r.kdv_orani / 100);
                araToplam += brut;
                toplamIskonto += isk;
                kdvToplam += kdv;
            });
            const genelToplam = araToplam - toplamIskonto + kdvToplam;
            const payload = {
                fatura_no: document.getElementById('fatura-no').value.trim() || null,
                fatura_tarihi: document.getElementById('fatura-tarihi').value,
                fatura_saati: document.getElementById('fatura-saati').value,
                fatura_tipi: document.getElementById('fatura-tipi').value,
                musteri_id: document.getElementById('musteri-id').value,
                musteri_adi: document.getElementById('musteri-ara').value.trim(),
                notlar: document.getElementById('fatura-not').value.trim() || null,
                satirlar: rows,
                ara_toplam: araToplam,
                toplam_iskonto: toplamIskonto,
                kdv_toplam: kdvToplam,
                toplam: genelToplam
            };
            try {
                const res = await fetch(API_FATURA_ONIZLE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    const txt = await res.text();
                    alert('Önizleme hatası: ' + txt);
                    return;
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
            } catch(e){
                alert('Önizleme sırasında hata: ' + (e.message || e));
            }
        });

        // İlk satır yukarıdaki SECILI_MUSTERI bloğunda ekleniyor (varsayılan hizmet veya boş)
    })();
    </script>
</body>
</html>
