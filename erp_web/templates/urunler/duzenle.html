{% extends "layout.html" %}

{% block page_title %}Ürün Düzenle{% endblock %}

{% block content %}
<style>
.urun-form-wrap {
  background:#0f2537;
  border-radius:6px;
  padding:16px 18px;
  margin:-10px -10px 0 -10px;
}
.urun-form-head {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.urun-form-head h2 {
  font-size:16px;
  color:#4fc3f7;
  margin:0;
}
.urun-form-head .back-link {
  color:#90caf9;
  font-size:12px;
  text-decoration:none;
}
.urun-form-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px 18px;
}
.urun-form-row {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:4px;
}
.urun-form-row label {
  width:100%;
  font-size:12px;
  color:#b0bec5;
}
.urun-form-row input,
.urun-form-row select,
.urun-form-row textarea {
  flex:1;
  background:#1e3a50;
  border:1px solid #2d4060;
  color:#e0f7fa;
  padding:6px 10px;
  border-radius:4px;
  font-size:13px;
}
.urun-form-row textarea { min-height:70px; resize:vertical; }
.urun-actions {
  margin-top:18px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.urun-btn {
  border:none;
  border-radius:4px;
  padding:8px 16px;
  font-size:13px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.urun-btn.save { background:#00bcd4; color:#fff; }
.urun-btn.cancel { background:#37474f; color:#eceff1; }
.small-btn { font-size:11px; padding:4px 8px; }
</style>

<div class="urun-form-wrap">
  <div class="urun-form-head">
    <h2>✏️ Ürün Düzenle</h2>
    <a href="{{ url_for('urunler.index') }}" class="back-link"><i class="fa fa-arrow-left"></i> Listeye dön</a>
  </div>

  <div class="urun-form-grid">
    <div class="urun-form-row">
      <label for="urun_adi">Ürün Adı *</label>
      <input id="urun_adi" type="text" placeholder="Ürün / hizmet adı" value="{{ urun.urun_adi or '' }}" style="min-width:280px; box-sizing:border-box;">
    </div>
    <div class="urun-form-row">
      <label for="stok_kodu">Stok Kodu *</label>
      <div style="display:flex; gap:8px; width:100%; align-items:center;">
        <input id="stok_kodu" type="text" placeholder="Örn: 0001" style="flex:1;" value="{{ urun.stok_kodu or '' }}">
        <button class="urun-btn small-btn" type="button" onclick="otomatikKod()"><i class="fa fa-magic"></i> Otomatik Kod</button>
      </div>
    </div>
    <div class="urun-form-row">
      <label for="birim">Birim</label>
      <select id="birim">
        <option value="adet" {% if (urun.birim or 'adet') == 'adet' %}selected{% endif %}>Adet</option>
        <option value="paket" {% if (urun.birim or '') == 'paket' %}selected{% endif %}>Paket</option>
        <option value="kg" {% if (urun.birim or '') == 'kg' %}selected{% endif %}>Kg</option>
        <option value="saat" {% if (urun.birim or '') == 'saat' %}selected{% endif %}>Saat</option>
      </select>
    </div>
    <div class="urun-form-row">
      <label for="kdv_orani">KDV %</label>
      <select id="kdv_orani">
        <option value="0" {% if urun.kdv_orani == 0 %}selected{% endif %}>%0</option>
        <option value="10" {% if urun.kdv_orani == 10 %}selected{% endif %}>%10</option>
        <option value="18" {% if urun.kdv_orani == 18 %}selected{% endif %}>%18</option>
        <option value="20" {% if urun.kdv_orani == 20 %}selected{% endif %}>%20</option>
      </select>
    </div>
    <div class="urun-form-row">
      <label for="birim_fiyat">Birim Fiyat (₺)</label>
      <input id="birim_fiyat" type="number" step="0.01" min="0" placeholder="0,00" value="{{ urun.birim_fiyat or 0 }}">
    </div>
    <div class="urun-form-row">
      <label for="stok_miktari">Stok Miktarı</label>
      <input id="stok_miktari" type="number" step="0.01" min="0" placeholder="0" value="{{ urun.stok_miktari or 0 }}">
    </div>
    <div class="urun-form-row">
      <label for="is_active">Aktif</label>
      <input id="is_active" type="checkbox" {% if urun.is_active %}checked{% endif %}>
    </div>
    <div class="urun-form-row" style="grid-column:1 / -1;">
      <label for="aciklama">Açıklama</label>
      <textarea id="aciklama" placeholder="Opsiyonel açıklama / not">{{ urun.aciklama or '' }}</textarea>
    </div>
  </div>

  <div class="urun-actions">
    <button class="urun-btn cancel" type="button" onclick="window.location.href='{{ url_for('urunler.index') }}'"><i class="fa fa-times"></i> Vazgeç</button>
    <button class="urun-btn save" type="button" onclick="urunKaydet()"><i class="fa fa-save"></i> Kaydet</button>
  </div>
</div>

<script>
const urunId = {{ urun.id }};

async function otomatikKod() {
  try {
    const r = await fetch("{{ url_for('urunler.api_next_kod') }}");
    const j = await r.json();
    if (j && j.stok_kodu) {
      document.getElementById('stok_kodu').value = j.stok_kodu;
    }
  } catch (e) {
    alert('Stok kodu alınırken hata oluştu');
  }
}

async function urunKaydet() {
  const urun_adi = document.getElementById('urun_adi').value.trim();
  const stok_kodu = document.getElementById('stok_kodu').value.trim();
  const birim = document.getElementById('birim').value;
  const kdv_orani = document.getElementById('kdv_orani').value;
  const birim_fiyat = document.getElementById('birim_fiyat').value;
  const stok_miktari = document.getElementById('stok_miktari').value;
  const aciklama = document.getElementById('aciklama').value.trim();
  const is_active = document.getElementById('is_active').checked;

  if (!urun_adi || !stok_kodu) {
    alert('Lütfen Ürün Adı ve Stok Kodu alanlarını doldurun.');
    return;
  }

  try {
    const r = await fetch("{{ url_for('urunler.api_save') }}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: urunId, urun_adi, stok_kodu, birim, kdv_orani, birim_fiyat, stok_miktari, aciklama, is_active })
    });
    const j = await r.json();
    if (!r.ok || !j.ok) {
      alert(j.mesaj || 'Kayıt sırasında hata oluştu.');
      return;
    }
    alert('Ürün güncellendi.');
    window.location.href = "{{ url_for('urunler.index') }}";
  } catch (e) {
    alert('Ürün güncellenirken beklenmeyen bir hata oluştu: ' + e);
  }
}
</script>
{% endblock %}
