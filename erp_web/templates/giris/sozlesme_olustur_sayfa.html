{% extends "layout.html" %}
{% block page_title %}Sözleşme Oluştur{% endblock %}
{% block content %}
<div style="max-width: 560px; margin: 40px auto; padding: 24px; background: #1e3a50; border-radius: 8px; color: #e0f7fa;">
    <h2 style="color: #4fc3f7; margin: 0 0 16px 0;"><i class="fa fa-file-contract"></i> Sözleşme Hazır</h2>
    <p style="color: #90a4ae; margin-bottom: 24px;">Müşteri: <strong>{{ musteri.name or '—' }}</strong></p>
    <p style="color: #b0bec5; font-size: 14px; margin-bottom: 20px;">Word belgesini indirip müşteriye WhatsApp ile iletebilirsiniz.</p>
    <div style="display: flex; flex-wrap: wrap; gap: 12px;">
        <a href="{{ indir_url }}" class="btn-word" style="display: inline-flex; align-items: center; gap: 8px; background: #2196f3; color: white; padding: 12px 20px; border-radius: 6px; text-decoration: none; font-weight: 600;"><i class="fa fa-file-word-o"></i> Word İndir</a>
        <button type="button" onclick="window.open(whatsapp_url, '_blank')" class="btn-wa" style="display: inline-flex; align-items: center; gap: 8px; background: #25d366; color: white; padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600;"><i class="fa fa-whatsapp"></i> WhatsApp'a Gönder</button>
    </div>
</div>
<script>
var whatsapp_url = {{ whatsapp_url|tojson }};
</script>
{% endblock %}
